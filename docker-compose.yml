version: '3.8'

services:
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      - CLAUDE_API_KEY=${CLAUDE_API_KEY}
      - PORT=5000
      - FRONTEND_URL=http://localhost:3000
      - NODE_ENV=development
    volumes:
      - ./backend/src:/app/src

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app
      - /app/.next
    depends_on:
      - backend
